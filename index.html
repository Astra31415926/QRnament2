<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QRnament v3.2 // Spectral Mandala</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

    <style>
        body { background: #000; color: #fff; font-family: 'Inter', system-ui, sans-serif; overflow-x: hidden; }
        .c { color: #00FFFF; } .m { color: #FF00FF; } .y { color: #FFFF00; } 
        .k { color: #FF004D; } .a { color: #00FF41; } .n { color: #0088FF; }
        #canvas { width: 100%; height: 100%; object-fit: contain; image-rendering: pixelated; }
        #video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none; transform: scaleX(-1); }
        .scan-line { position: absolute; left: 0; right: 0; height: 4px; background: #00ff41; box-shadow: 0 0 20px #00ff41; top: 0; z-index: 20; display: none; }
        @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
        .flash-overlay { position: absolute; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 30; transition: opacity 0.1s; }
        .menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 100; transform: translateX(100%); transition: transform 0.4s; display: flex; flex-direction: column; padding: 2rem; overflow-y: auto; }
        .menu-overlay.open { transform: translateX(0); }
        .neon-btn-green { background: rgba(0, 255, 65, 0.05); border: 1px solid #00ff41; box-shadow: 0 0 10px rgba(0, 255, 65, 0.2); transition: all 0.2s; }
        .neon-btn-green:hover { box-shadow: 0 0 20px #00ff41; }
    </style>
</head>
<body class="flex flex-col min-h-screen p-4 max-w-md mx-auto">

    <div id="menu-overlay" class="menu-overlay">
        <div class="flex justify-between items-center mb-8">
            <button onclick="App.toggleMenu()" class="text-3xl text-zinc-500">&times;</button>
        </div>
        <div class="space-y-6 text-sm">
            <h2 class="text-xl font-black">QRnament v3.2</h2>
            <p class="text-zinc-500">Генератор спектральних мандал на основі 2D-кодів.</p>
        </div>
    </div>

    <header class="flex justify-between items-center mb-4">
        <h1 class="text-2xl font-black tracking-tighter uppercase">QR<span class="c">n</span><span class="m">a</span><span class="y">m</span><span class="k">e</span><span class="a">n</span><span class="n">t</span></h1>
        <button onclick="App.toggleMenu()" class="p-2 border border-white/10 rounded-lg">MENU</button>
    </header>

    <div class="mb-4 relative">
        <textarea id="main-input" class="w-full p-4 bg-zinc-900 rounded-2xl border-l-4 border-emerald-500 outline-none h-16 text-sm" placeholder="Type to generate..."></textarea>
        <button onclick="App.clearText()" class="absolute right-3 top-3 text-zinc-500 hover:text-red-500">DEL</button>
    </div>

    <div class="relative aspect-square w-full bg-zinc-950 rounded-3xl overflow-hidden mb-4 border border-white/5">
        <canvas id="canvas" width="1024" height="1024"></canvas>
        <video id="video" playsinline></video>
        <div id="scan-line" class="scan-line"></div>
        <div id="flash-layer" class="flash-overlay"></div>
    </div>

    <div class="flex flex-col gap-3">
        <button onclick="App.save()" class="w-full py-4 neon-btn-green rounded-2xl font-black text-xs uppercase tracking-widest">Save PNG</button>
        <div class="grid grid-cols-2 gap-3">
            <button onclick="App.startCamera()" class="py-4 border border-emerald-500 rounded-2xl text-xs uppercase font-bold">Cam Scan</button>
            <button onclick="document.getElementById('file-input').click()" class="py-4 border border-emerald-500 rounded-2xl text-xs uppercase font-bold">File Scan</button>
        </div>
        <input type="file" id="file-input" accept="image/*" class="hidden">
    </div>

    <p id="status" class="text-center text-[10px] text-emerald-500 uppercase font-bold mt-4">Ready</p>

    <script>
        const SPRITE_LIB_7x7 = [
            [73,42,28,127,28,42,73], [127,65,93,85,93,65,127], [85,62,99,42,99,62,85],
            [42,119,34,73,34,119,42], [28,42,73,119,73,42,28], [0,62,34,42,46,32,63],
            [15,1,29,5,52,16,64], [64,96,112,120,112,96,64], [76,102,51,25,51,102,76],
            [119,69,117,0,87,81,119], [119,85,119,0,119,85,119], [119,65,93,20,93,65,119],
            [62,73,93,127,93,73,62], [42,107,8,119,8,107,42], [8,42,8,119,8,42,8],
            [28,8,65,99,65,8,28], [54,99,73,20,73,99,54], [63,31,15,7,3,1,0],
            [127,63,31,15,7,3,1], [127,31,31,7,7,1,1], [119,17,93,68,119,17,89],
            [119,21,87,80,127,17,89], [119,85,127,20,127,85,119], [87,80,87,0,117,5,117],
            [95,80,87,65,117,5,125], [30,80,87,65,117,5,60], [91,80,11,93,104,5,109],
            [42,99,8,93,8,99,42], [99,99,0,0,0,99,99], [99,99,99,99,99,99,99],
            [119,93,99,34,99,93,119], [54,85,99,8,99,85,54], [91,73,109,36,54,18,91],
            [127,8,107,34,107,8,127], [42,34,42,8,42,34,42], [56,43,9,127,72,106,14],
            [60,72,81,99,69,9,30], [12,56,33,107,66,14,24], [32,126,34,34,34,63,2],
            [100,94,51,42,102,61,19], [6,92,118,34,55,29,48], [28,62,119,99,119,62,28],
            [62,99,73,93,73,99,62], [126,67,89,85,77,97,63], [54,85,107,28,107,85,54],
            [127,119,99,73,99,119,127], [12,22,51,113,14,76,104], [107,73,8,127,8,73,107],
            [0,62,34,42,58,2,126], [85,21,117,5,125,1,127], [52,102,71,85,71,102,52],
            [8,8,42,34,54,20,93], [119,99,107,8,107,99,119], [62,34,107,8,107,34,62],
            [73,62,34,107,34,62,73], [123,123,96,107,3,111,111], [91,27,96,107,3,108,109],
            [0,63,32,62,2,126,0], [64,95,81,93,69,125,1], [51,51,102,102,76,76,25]
        ];

        const App = {
            state: { isScanning: false },
            init() {
                this.els = {
                    canvas: document.getElementById('canvas'),
                    video: document.getElementById('video'),
                    input: document.getElementById('main-input'),
                    status: document.getElementById('status'),
                    scanLine: document.getElementById('scan-line'),
                    flash: document.getElementById('flash-layer'),
                    menu: document.getElementById('menu-overlay'),
                    fileInput: document.getElementById('file-input'),
                    ctx: document.getElementById('canvas').getContext('2d')
                };
                this.els.input.addEventListener('input', () => this.generate());
                this.els.fileInput.addEventListener('change', (e) => this.handleFile(e));
                this.clearCanvas();
            },

            toggleMenu() { this.els.menu.classList.toggle('open'); },
            clearText() { this.els.input.value = ""; this.clearCanvas(); },

            generate() {
                const text = this.els.input.value;
                if (!text) return this.clearCanvas();

                try {
                    const qr = qrcode(0, 'M');
                    qr.addData(unescape(encodeURIComponent(text)));
                    qr.make();
                    
                    const count = qr.getModuleCount();
                    const quiet = 4;
                    const total = count + quiet * 2;
                    const modSize = 1024 / total;

                    // Генерация двух независимых мандал (рандом внутри функции)
                    const gridR = this.build7x7Grid(total);
                    const gridG = this.build7x7Grid(total);

                    const ctx = this.els.ctx;
                    ctx.globalCompositeOperation = "source-over";
                    ctx.fillStyle = "#000";
                    ctx.fillRect(0, 0, 1024, 1024);

                    ctx.globalCompositeOperation = "screen";

                    // Канал RED
                    ctx.fillStyle = "#FF0000";
                    this.drawGrid(ctx, gridR, total, modSize);

                    // Канал GREEN
                    ctx.fillStyle = "#00FF00";
                    this.drawGrid(ctx, gridG, total, modSize);

                    // Канал BLUE (Данные QR)
                    ctx.fillStyle = "#0000FF";
                    for (let r = 0; r < count; r++) {
                        for (let c = 0; c < count; c++) {
                            if (qr.isDark(r, c)) {
                                ctx.fillRect((c + quiet) * modSize, (r + quiet) * modSize, modSize, modSize);
                            }
                        }
                    }
                    this.els.status.innerText = "Generated: Mandala Mode";
                } catch (e) { console.error(e); }
            },

            build7x7Grid(size) {
                const grid = Array(size).fill(0).map(() => Array(size).fill(0));
                const center = Math.floor(size / 2);
                
                // Проход по октанту (1/8) для 8-лучевой симметрии
                for (let y = 0; y <= center; y++) {
                    for (let x = 0; x <= y; x++) {
                        
                        // Чистый рандом для каждой точки октанта
                        const patternIdx = Math.floor(Math.random() * SPRITE_LIB_7x7.length);
                        const pattern = SPRITE_LIB_7x7[patternIdx];
                        
                        // Случайное отражение внутри блока для доп. хаоса
                        const flipX = Math.random() > 0.5;
                        const flipY = Math.random() > 0.5;
                        const localX = flipX ? (6 - (x % 7)) : (x % 7);
                        const localY = flipY ? (6 - (y % 7)) : (y % 7);

                        let val = 0;
                        if ((pattern[localY] >> (6 - localX)) & 1) val = 255;

                        // Отражение по 8 осям (Мандала)
                        [[x,y],[y,x],[-x,y],[-y,x],[x,-y],[y,-x],[-x,-y],[-y,-x]].forEach(([px, py]) => {
                            const gx = center + px, gy = center + py;
                            if (gx >= 0 && gx < size && gy >= 0 && gy < size) grid[gy][gx] = val;
                        });
                    }
                }
                return grid;
            },

            drawGrid(ctx, grid, size, cellSize) {
                for(let r=0; r<size; r++) {
                    for(let c=0; c<size; c++) {
                        if(grid[r][c]) ctx.fillRect(c * cellSize, r * cellSize, cellSize + 0.5, cellSize + 0.5);
                    }
                }
            },

            startCamera() {
                if(this.state.isScanning) return;
                this.state.isScanning = true;
                navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                    .then(s => {
                        this.els.video.srcObject = s;
                        this.els.video.style.display = 'block';
                        this.els.video.play();
                        this.scanLoop();
                    });
            },

            scanLoop() {
                if (!this.state.isScanning) return;
                const v = this.els.video;
                if (v.readyState === v.HAVE_ENOUGH_DATA) {
                    const canvas = document.createElement('canvas');
                    canvas.width = 1024; canvas.height = 1024;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(v, 0, 0, 1024, 1024);
                    const img = ctx.getImageData(0,0,1024,1024);
                    const code = jsQR(img.data, 1024, 1024);
                    if (code) {
                        this.els.input.value = code.data;
                        this.stopCamera();
                        this.generate();
                        return;
                    }
                }
                requestAnimationFrame(() => this.scanLoop());
            },

            stopCamera() {
                this.state.isScanning = false;
                if(this.els.video.srcObject) this.els.video.srcObject.getTracks().forEach(t => t.stop());
                this.els.video.style.display = 'none';
            },

            save() {
                const a = document.createElement('a');
                a.download = 'mandala-qr.png';
                a.href = this.els.canvas.toDataURL();
                a.click();
            },

            clearCanvas() { this.els.ctx.fillStyle = "#000"; this.els.ctx.fillRect(0,0,1024,1024); }
        };

        document.addEventListener('DOMContentLoaded', () => App.init());
    </script>
</body>
</html>
