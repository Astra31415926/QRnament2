<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QRnament Lab v2.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #0088FF; --red: #FF004D; --green: #00FF41; }
        body { background: #050505; color: #eee; font-family: 'Space Grotesk', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Экран холста */
        .canvas-container { position: relative; flex: 1; display: flex; align-items: center; justify-content: center; background: #000; padding: 20px; overflow: hidden; }
        canvas { max-width: 100%; max-height: 100%; object-fit: contain; image-rendering: pixelated; border: 1px solid #222; box-shadow: 0 0 50px rgba(0,0,0,1); }
        video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; pointer-events: none; transition: 0.3s; }
        .scan-active video { opacity: 0.4; }

        /* Полоса сканера */
        .scan-line { position: absolute; left: 0; right: 0; height: 4px; background: var(--green); box-shadow: 0 0 20px var(--green); top: 0; display: none; z-index: 100; pointer-events: none; }
        .scan-active .scan-line { display: block; animation: scan 2s linear infinite; }
        @keyframes scan { from { top: 10%; } to { top: 90%; } }

        /* Панель */
        .panel { background: rgba(15,15,15,0.95); border-top: 1px solid #222; padding: 15px; z-index: 200; backdrop-filter: blur(10px); }
        .tab-btn { flex: 1; padding: 10px; font-size: 11px; font-weight: bold; color: #444; border-bottom: 2px solid transparent; transition: 0.3s; }
        .active-blue { color: var(--blue); border-color: var(--blue); }
        .active-red { color: var(--red); border-color: var(--red); }
        .active-green { color: var(--green); border-color: var(--green); }

        input[type="range"] { accent-color: #555; width: 100%; height: 4px; }
        .mode-btn { padding: 6px; background: #111; border: 1px solid #222; border-radius: 4px; font-size: 9px; color: #666; }
        .mode-btn.active { color: #fff; border-color: #444; background: #222; }
    </style>
</head>
<body>

    <div class="canvas-container" id="view">
        <canvas id="mainCanvas"></canvas>
        <video id="videoLayer" playsinline></video>
        <div class="scan-line"></div>
        <button onclick="location.reload()" class="absolute top-4 right-4 z-[300] bg-black/50 p-2 rounded-lg text-[10px] mono border border-white/10 hover:bg-white hover:text-black transition">RESET</button>
        <div id="status" class="absolute top-4 left-4 text-[10px] mono text-white/30 uppercase tracking-widest">System Ready</div>
    </div>

    <div class="panel">
        <div class="flex mb-4 gap-2">
            <button onclick="setTab('blue')" id="btn-blue" class="tab-btn active-blue">DATA (B)</button>
            <button onclick="setTab('red')" id="btn-red" class="tab-btn">ART (R)</button>
            <button onclick="setTab('green')" id="btn-green" class="tab-btn">ART (G)</button>
        </div>

        <div id="tab-blue-content">
            <textarea id="inputText" class="w-full bg-black border border-zinc-800 p-3 rounded-xl text-sm mono text-blue-400 focus:border-blue-500 outline-none h-24" placeholder="Enter message..."></textarea>
        </div>

        <div id="tab-art-content" class="hidden space-y-4">
            <div id="mode-selector" class="grid grid-cols-5 gap-1"></div>
            <div class="space-y-2">
                <div class="flex justify-between text-[10px] mono text-zinc-500"><span>Density</span><span id="label-dens">45%</span></div>
                <input type="range" id="input-dens" min="0" max="100">
                <div class="flex justify-between text-[10px] mono text-zinc-500"><span>Structure</span><span id="label-struct">70%</span></div>
                <input type="range" id="input-struct" min="0" max="100">
            </div>
        </div>

        <div class="grid grid-cols-3 gap-2 mt-4 border-t border-zinc-800 pt-4">
            <button onclick="save()" class="bg-white text-black font-bold py-3 rounded-xl text-[10px] uppercase">Save HD</button>
            <button onclick="startCam()" class="bg-zinc-800 text-white font-bold py-3 rounded-xl text-[10px] uppercase">Cam</button>
            <button onclick="document.getElementById('fileIn').click()" class="bg-zinc-800 text-white font-bold py-3 rounded-xl text-[10px] uppercase">File</button>
            <input type="file" id="fileIn" class="hidden" accept="image/*" onchange="handleFile(event)">
        </div>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas'), ctx = canvas.getContext('2d');
        const video = document.getElementById('videoLayer'), input = document.getElementById('inputText');
        
        let activeLayer = 'red'; 
        const state = {
            text: '',
            red: { mode: 'crystal', dens: 0.45, struct: 0.7 },
            green: { mode: 'flow', dens: 0.35, struct: 0.8 }
        };

        const Patterns = {
            chaos: (x, y, d) => Math.random() < d ? 1 : 0,
            lines: (x, y, d) => (x + y) % 6 < 2 ? 1 : 0,
            cross: (x, y, d) => (Math.abs(x) < 1 || Math.abs(y) < 1) ? 1 : 0,
            crystal: (x, y, d) => Math.abs(Math.sin(Math.sqrt(x*x+y*y)*0.5)) > (1-d) ? 1 : 0,
            flow: (x, y, d) => (Math.sin(x*0.2) + Math.cos(y*0.2)) > (1.5 - d*2) ? 1 : 0
        };

        function setTab(t) {
            document.getElementById('tab-blue-content').classList.toggle('hidden', t !== 'blue');
            document.getElementById('tab-art-content').classList.toggle('hidden', t === 'blue');
            ['blue','red','green'].forEach(l => document.getElementById('btn-'+l).className = 'tab-btn' + (t===l ? ' active-'+l : ''));
            if(t !== 'blue') {
                activeLayer = t;
                updateControls();
            }
        }

        function updateControls() {
            const s = state[activeLayer];
            document.getElementById('input-dens').value = s.dens * 100;
            document.getElementById('input-struct').value = s.struct * 100;
            document.getElementById('label-dens').innerText = Math.round(s.dens*100)+'%';
            document.getElementById('label-struct').innerText = Math.round(s.struct*100)+'%';
            renderModes();
        }

        function renderModes() {
            const container = document.getElementById('mode-selector');
            container.innerHTML = '';
            Object.keys(Patterns).forEach(m => {
                const b = document.createElement('button');
                b.className = `mode-btn ${state[activeLayer].mode === m ? 'active' : ''}`;
                b.innerText = m.toUpperCase();
                b.onclick = () => { state[activeLayer].mode = m; draw(); renderModes(); };
                container.appendChild(b);
            });
        }

        function draw() {
            const txt = input.value || "QRnament";
            const qr = qrcode(0, 'M');
            qr.addData(unescape(encodeURIComponent(txt)));
            qr.make();
            const count = qr.getModuleCount();
            
            // Физический размер холста для сохранения качества
            const exportSize = 1024;
            canvas.width = exportSize; canvas.height = exportSize;
            const mod = exportSize / count;

            ctx.fillStyle = '#000'; ctx.fillRect(0,0,exportSize,exportSize);
            
            const center = Math.floor(count / 2);
            
            for(let r=0; r<count; r++) {
                for(let c=0; c<count; c++) {
                    const dx = c - center, dy = r - center;
                    // Symmetry logic
                    const x = Math.abs(dx), y = Math.abs(dy);
                    const nx = Math.max(x,y), ny = Math.min(x,y);

                    ctx.globalCompositeOperation = "screen";
                    
                    // Blue (QR)
                    if(qr.isDark(r,c)) { ctx.fillStyle = '#00F'; ctx.fillRect(c*mod, r*mod, mod, mod); }
                    
                    // Red Art
                    if(Patterns[state.red.mode](nx, ny, state.red.dens) && Math.random() < state.red.struct) {
                        ctx.fillStyle = '#F00'; ctx.fillRect(c*mod, r*mod, mod, mod);
                    }
                    // Green Art
                    if(Patterns[state.green.mode](nx, ny, state.green.dens) && Math.random() < state.green.struct) {
                        ctx.fillStyle = '#0F0'; ctx.fillRect(c*mod, r*mod, mod, mod);
                    }
                }
            }
            document.getElementById('status').innerText = `Grid: ${count}x${count} | HD Active`;
        }

        const audio = new (window.AudioContext || window.webkitAudioContext)();
        function beep(f, d, t="sine") {
            const o = audio.createOscillator(), g = audio.createGain();
            o.type = t; o.frequency.setValueAtTime(f, audio.currentTime);
            if(f > 1000) o.frequency.exponentialRampToValueAtTime(100, audio.currentTime+d);
            g.gain.setValueAtTime(0.1, audio.currentTime); g.gain.linearRampToValueAtTime(0, audio.currentTime+d);
            o.connect(g); g.connect(audio.destination); o.start(); o.stop(audio.currentTime+d);
        }

        async function startCam() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream; video.play(); document.body.classList.add('scan-active');
            beep(400, 0.5);
            const tick = () => {
                if(!video.srcObject) return;
                const tmp = document.createElement('canvas'); tmp.width = 512; tmp.height = 512;
                const tCtx = tmp.getContext('2d'); tCtx.drawImage(video, 0, 0, 512, 512);
                const data = tCtx.getImageData(0,0,512,512);
                // Isolate Blue for jsQR
                for(let i=0; i<data.data.length; i+=4) {
                    const b = data.data[i+2]; data.data[i]=b; data.data[i+1]=b;
                }
                const code = jsQR(data.data, 512, 512);
                if(code) {
                    input.value = code.data; beep(1200, 0.3); stopCam(); draw();
                } else requestAnimationFrame(tick);
            };
            tick();
        }

        function stopCam() {
            video.srcObject.getTracks().forEach(t => t.stop()); video.srcObject = null;
            document.body.classList.remove('scan-active');
        }

        function handleFile(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const tmp = document.createElement('canvas'); tmp.width = 600; tmp.height = 600;
                    const tCtx = tmp.getContext('2d'); tCtx.drawImage(img, 0, 0, 600, 600);
                    const data = tCtx.getImageData(0,0,600,600);
                    for(let i=0; i<data.data.length; i+=4) { const b = data.data[i+2]; data.data[i]=b; data.data[i+1]=b; }
                    const code = jsQR(data.data, 600, 600);
                    if(code) { input.value = code.data; beep(1200, 0.3); draw(); }
                    else { beep(150, 0.5, "square"); alert("QR не найден в синем канале!"); }
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        }

        function save() {
            const link = document.createElement('a'); link.download = 'QRnament_HD.png';
            link.href = canvas.toDataURL('image/png', 1.0); link.click();
            beep(800, 0.2);
        }

        input.oninput = draw;
        document.getElementById('input-dens').oninput = (e) => { 
            state[activeLayer].dens = e.target.value/100; updateControls(); draw(); 
        };
        document.getElementById('input-struct').oninput = (e) => { 
            state[activeLayer].struct = e.target.value/100; updateControls(); draw(); 
        };

        renderModes(); draw();
    </script>
</body>
</html>
