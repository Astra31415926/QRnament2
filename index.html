    <style>
        :root {
            --bg-color: #000000;
            --ui-font: 'Inter', system-ui, sans-serif;
        }
        
        body { 
            background: var(--bg-color); 
            color: #fff; 
            font-family: var(--ui-font); 
            overflow-x: hidden;
            min-height: 100vh;
            touch-action: manipulation;
        }

        /* Logo Colors */
        .c { color: #00FFFF; } .m { color: #FF00FF; } .y { color: #FFFF00; } 
        .k { color: #FF004D; } .a { color: #00FF41; } .n { color: #0088FF; }

        /* Screen Management */
        .screen { display: none; flex-direction: column; min-height: 100vh; }
        .screen.active { display: flex; }

        /* Inputs */
        textarea {
            background: rgba(10, 10, 10, 0.8);
            border: 2px solid rgba(255,255,255,0.1);
            color: #fff;
            font-family: var(--ui-font);
            resize: none;
            transition: all 0.3s;
        }
        textarea:focus { 
            outline: none; 
            border-color: rgba(255,255,255,0.3);
            background: rgba(20, 20, 20, 0.9);
        }
        
        /* Buttons */
        .btn-primary {
            position: relative;
            overflow: hidden;
            font-weight: 800;
            letter-spacing: 0.05em;
            transition: all 0.2s;
        }
        .btn-create {
            background: linear-gradient(135deg, #F97316, #EA580C);
            box-shadow: 0 4px 15px rgba(249, 115, 22, 0.3);
        }
        .btn-scan-ui {
            background: linear-gradient(135deg, #14B8A6, #0D9488);
            color: #000;
            box-shadow: 0 4px 15px rgba(20, 184, 166, 0.3);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-secondary:active { background: rgba(255,255,255,0.1); }

        /* Viewfinder */
        .viewfinder-corners {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 15;
            transition: all 0.3s;
        }
        .corner {
            position: absolute;
            width: 20px; height: 20px;
            border-color: rgba(255,255,255,0.3);
            transition: all 0.3s;
        }
        .tl { top: 0; left: 0; border-top: 3px solid; border-left: 3px solid; }
        .tr { top: 0; right: 0; border-top: 3px solid; border-right: 3px solid; }
        .bl { bottom: 0; left: 0; border-bottom: 3px solid; border-left: 3px solid; }
        .br { bottom: 0; right: 0; border-bottom: 3px solid; border-right: 3px solid; }
        
        .viewfinder-hunting .corner { 
            border-color: #00ff41; 
            box-shadow: 0 0 8px #00ff41;
            animation: pulse 1.5s infinite alternate; 
        }
        @keyframes pulse { 0% { opacity: 0.5; } 100% { opacity: 1; } }

        /* Effects */
        @keyframes flash { 0% { opacity: 0; } 20% { opacity: 0.8; } 100% { opacity: 0; } }
        .flash-anim { animation: flash 0.3s ease-out; }

        /* Dropdown Menu */
        .dropdown-menu { 
            transform: translateY(-10px); opacity: 0; visibility: hidden; 
            transition: all 0.2s ease; 
        }
        .dropdown-menu.show { transform: translateY(0); opacity: 1; visibility: visible; }
    </style>
</head>

        // === 2. DICTIONARY (i18n) ===

                // Buttons

                btn_save: "Save PNG",
                btn_cam: "📸 Camera",
                btn_file: "🖼️ Gallery",
                
                // Headers

        };

        // === 3. STATE & CONFIG ===
        const state = {
            scanning: false,
            locked: { b: false },
            results: { b: null },
            activeSearch: false,
            standardFailCount: 0,
            AUTO_TRIGGER_THRESHOLD: 45,

        const els = {

        // Initialize Canvas
        els.main.width = 512; els.main.height = 512;
        els.freeze.width = 512; els.freeze.height = 512;
        els.main.className = "w-full h-full transition-all duration-500 relative z-10";

        // === 4. ALGORITHMS ===
        function applyBradleyStandard(imgData, chIdx) {
            const w = imgData.width, h = imgData.height;
            const input = imgData.data;
            const output = new Uint8ClampedArray(w * h * 4);
            const intImg = new Int32Array(w * h);
            const s = Math.floor(w / 8), t = 15;

            for (let y = 0; y < h; y++) {
                let sum = 0;
                for (let x = 0; x < w; x++) {
                    sum += input[(y * w + x) * 4 + chIdx];
                    intImg[y * w + x] = (y > 0 ? intImg[(y - 1) * w + x] : 0) + sum;
                }
            }

            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const x1 = Math.max(x - s, 0), x2 = Math.min(x + s, w - 1);
                    const y1 = Math.max(y - s, 0), y2 = Math.min(y + s, h - 1);
                    const count = (x2 - x1) * (y2 - y1);
                    const sum = intImg[y2 * w + x2] - intImg[y1 * w + x2] - intImg[y2 * w + x1] + intImg[y1 * w + x1];
                    const val = input[(y * w + x) * 4 + chIdx];
                    const res = (val * count < sum * (100 - t) / 100) ? 0 : 255;
                    const idx = (y * w + x) * 4;
                    output[idx] = output[idx+1] = output[idx+2] = res; output[idx+3] = 255;
                }
            }
            return new ImageData(output, w, h);
        }

        function applySCIMath(imgData, ch, cfg) {
            const d = imgData.data;
            for (let i = 0; i < d.length; i += 4) {
                let r = d[i], g = d[i+1], b = d[i+2];
                let target, n1, n2;
                if (ch === 'B') { target = b; n1 = r; n2 = g; }
                else { target = b; n1 = r; n2 = g; }

                let res = (target - (n1 * cfg.k1 + n2 * cfg.k2)) * cfg.gain + cfg.offset;
                res = Math.max(0, Math.min(255, res));
                d[i] = res; d[i+1] = res; d[i+2] = res; d[i+3] = 255;
            }
        }

        function getOscParam(t, period, min, max) {
            const cycle = t % period;
            const half = period / 2;
            const pos = (cycle < half) ? cycle / half : (period - cycle) / half;
            return min + pos * (max - min);
        }

        // === 5. LOCALIZATION LOGIC ===
        function setLang(lang) {
            const dict = LANG[lang];
            if (!dict) return;

            // 1. Inject Welcome HTML
            const welcomeEl = document.getElementById('welcome-text');
            if (welcomeEl) welcomeEl.innerHTML = dict.welcome_html;

            // 2. Inject Text Content using Key -> ID mapping
            // Keys: t_header_create, t_tech_text -> IDs: t-header-create, t-tech-text

                't_tech_text', 't_tech_text_2', 't_tech_contact'

        // === 6. MAIN HYBRID LOOP ===
        function processLoop() {
            if (!state.scanning) return;

            let sourceCopy = null;
            
            if (els.video.classList.contains('hidden') === false && els.video.readyState === els.video.HAVE_ENOUGH_DATA) {
                els.ctx.drawImage(els.video, 0, 0, 512, 512);
                sourceCopy = els.ctx.getImageData(0, 0, 512, 512);
            } else if (els.freeze.classList.contains('hidden') === false) {
                sourceCopy = els.fCtx.getImageData(0, 0, 512, 512);
            }

            if (sourceCopy) {
                if (state.standardFailCount > state.AUTO_TRIGGER_THRESHOLD && !state.activeSearch) {
                    state.activeSearch = true;
                }

                if (!state.locked.b) {
                    const ch = 'B';
                    const idx = 2; 
                    const baseCfg = state.config[ch];
                    let foundInFrame = false;

                    if (state.activeSearch) {
                        state.time++; 
                        const gain = getOscParam(state.time, 100, 0.5, 3.5);
                        const offset = getOscParam(state.time, 250, -80, 0);
                        const cfg = { ...baseCfg, gain, offset };

                        let workData = new ImageData(new Uint8ClampedArray(sourceCopy.data), 512, 512);
                        applySCIMath(workData, ch, cfg);
                        let mono = applyBradleyStandard(workData, 0);
                        
                        const code = jsQR(mono.data, 512, 512, { inversionAttempts: "attemptBoth" });
                        
                        if (code) {
                            lockChannel(ch, code.data);
                            foundInFrame = true;
                        }
                        
                        if (!foundInFrame) els.ctx.putImageData(workData, 0, 0);

                    } else {
                        state.standardFailCount++;
                        let mono = applyBradleyStandard(sourceCopy, idx);
                        const code = jsQR(mono.data, 512, 512, { inversionAttempts: "attemptBoth" });
                        
                        if (code) {
                            lockChannel(ch, code.data);
                            foundInFrame = true;
                            state.standardFailCount = 0; 
                        }
                        
                        if (!foundInFrame) els.ctx.putImageData(sourceCopy, 0, 0);
                    }
                }
            }
            requestAnimationFrame(processLoop);
        }

        // === 7. UI & ACTIONS ===
        function lockChannel(ch, data) {
            const key = ch.toLowerCase();
            if (state.locked[key]) return;
            
            state.locked[key] = true;
            state.results[key] = data;
            
            playBeep();
            flashScreen();
            
            els.viewfinder.classList.add('viewfinder-hunting');
            setTimeout(() => els.viewfinder.classList.remove('viewfinder-hunting'), 300);

            els.bTextScan.value = data;
            els.bTextScan.classList.add('locked', 'locked-b');
            
            els.bText.value = data;
            els.bText.classList.add('locked', 'locked-b');

            if (state.locked.b) {
                stopScanning();
                switchScreen('create');
                generateMandala();
            }
        }

        function playBeep() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const o = ctx.createOscillator();
                const g = ctx.createGain();
                o.connect(g); g.connect(ctx.destination);
                o.frequency.value = 880; o.type = "sine";
                g.gain.setValueAtTime(0.1, ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.15);
                o.start(); o.stop(ctx.currentTime + 0.15);
            } catch(e){}
        }

        function flashScreen() {
            els.flash.classList.add('flash-anim');
            setTimeout(() => els.flash.classList.remove('flash-anim'), 400);
        }

        function switchScreen(screenName) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + screenName).classList.add('active');
            
            const container = els.containers[screenName];
            if (container) {
                if (screenName === 'create') {
                    container.appendChild(els.main);
                    els.main.classList.remove('hidden');
                    els.main.style.opacity = '1';
                } else if (screenName === 'scan') {
                    container.appendChild(els.video);
                    container.appendChild(els.freeze);
                    container.appendChild(els.main);
                    container.appendChild(els.viewfinder);
                }
            }
        }

        async function startCamera() {
            state.locked = {b:false};
            state.results = {b:null};
            state.activeSearch = false;
            state.standardFailCount = 0;
            
            els.bTextScan.value = "";
            els.bTextScan.classList.remove('locked', 'locked-b');
            els.bText.value = "";
            els.bText.classList.remove('locked', 'locked-b');

            els.viewfinder.classList.remove('hidden');
            els.video.classList.remove('hidden');
            els.freeze.classList.add('hidden');
            els.main.classList.add('hidden');

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: {ideal: 1280} } });
                els.video.srcObject = stream; 
                els.video.play();
                state.scanning = true;
                requestAnimationFrame(processLoop);
            } catch(e) { alert("Camera Error: " + e); }
        }

        function handleFile(e) {
            const file = e.target.files[0]; 
            if (!file) return;
            
            state.locked = {b:false};
            state.results = {b:null};
            state.activeSearch = false;
            state.standardFailCount = 0;

            els.bTextScan.value = "";
            els.bTextScan.classList.remove('locked', 'locked-b');
            els.bText.value = "";
            els.bText.classList.remove('locked', 'locked-b');
            
            els.viewfinder.classList.remove('hidden');
            
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const s = 512;
                    els.freeze.width = s; els.freeze.height = s;
                    const ctx = els.fCtx;
                    const min = Math.min(img.width, img.height);
                    ctx.drawImage(img, (img.width-min)/2, (img.height-min)/2, min, min, 0, 0, s, s);
                    
                    els.freeze.classList.remove('hidden');
                    els.video.classList.add('hidden');
                    els.main.classList.add('hidden');

                    state.scanning = true;
                    state.activeSearch = true;
                    state.standardFailCount = 100; 
                    requestAnimationFrame(processLoop);
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }

        function stopScanning() {
            state.scanning = false;
            if (els.video.srcObject) els.video.srcObject.getTracks().forEach(t => t.stop());
            els.viewfinder.classList.add('hidden');
            els.video.classList.add('hidden');
        }

        function hardReset() {
            stopScanning();
            
            // Full Reset
            state.locked = {b:false};
            state.results = {b:null};
            state.activeSearch = false;
            state.standardFailCount = 0;
            state.time = 0;

            els.bText.value = ""; 
            els.bText.classList.remove('locked', 'locked-b');
            els.bTextScan.value = ""; 
            els.bTextScan.classList.remove('locked', 'locked-b');
            
            els.freeze.classList.add('hidden');
            els.video.classList.add('hidden');
            
            els.ctx.fillStyle = "#000";
            els.ctx.fillRect(0,0,512,512);
            
            document.getElementById('btn-save').classList.add('hidden');
            
            switchScreen('home');
        }

        // === 8. MANDALA GENERATION ===
        function generateMandala() {
            const text = els.bText.value;
            
            els.ctx.fillStyle = "#000000"; 
            els.ctx.fillRect(0,0,512,512);

            if (!text.trim()) {
                els.main.style.opacity = 0.1;
                document.getElementById('btn-save').classList.add('hidden');
                return;
            }
            els.main.style.opacity = 1;
            els.main.classList.remove('hidden');

            try {
                const utf8Text = unescape(encodeURIComponent(text));
                const qr = qrcode(0, 'M');
                qr.addData(utf8Text);
                qr.make();
                
                const moduleCount = qr.getModuleCount();
                
                const frameOuter = 2; 
                const frameInner = 1; 
                const quietZone = 2; 
                
                const totalModules = moduleCount + (quietZone * 2) + (frameInner * 2) + (frameOuter * 2);
                const modSize = 512 / totalModules;

                const colOuter = "rgb(200, 200, 200)";
                const colInner = "rgb(50, 50, 50)";

                els.ctx.fillStyle = colOuter;
                els.ctx.fillRect(0, 0, 512, 512);

                const innerFrameOffset = frameOuter * modSize;
                const innerFrameSize = 512 - (innerFrameOffset * 2);
                els.ctx.fillStyle = colInner;
                els.ctx.fillRect(innerFrameOffset, innerFrameOffset, innerFrameSize, innerFrameSize);
                
                const ornamentSize = moduleCount + (quietZone * 2);
                const gridR = build7x7Grid(ornamentSize);
                const gridG = build7x7Grid(ornamentSize);

                const coreStart = frameOuter + frameInner + quietZone;
                
                for (let r = 0; r < totalModules; r++) {
                    for (let c = 0; c < totalModules; c++) {
                        const x = c * modSize;
                        const y = r * modSize;

                        const isOuterFrame = (r < frameOuter || r >= totalModules - frameOuter || c < frameOuter || c >= totalModules - frameOuter);
                        const isInnerFrame = !isOuterFrame && (r < frameOuter + frameInner || r >= totalModules - (frameOuter + frameInner) || c < frameOuter + frameInner || c >= totalModules - (frameOuter + frameInner));
                        
                        if (isOuterFrame) continue; 
                        if (isInnerFrame) continue; 
                        
                        const oR = r - (frameOuter + frameInner);
                        const oC = c - (frameOuter + frameInner);

                        const qrR = r - coreStart;
                        const qrC = c - coreStart;
                        
                        const isDataCore = (qrR >= 0 && qrR < moduleCount && qrC >= 0 && qrC < moduleCount);

                        // R & G Channels
                        let valR = gridR[oR][oC] ? 200 : 50;
                        let valG = gridG[oR][oC] ? 200 : 50;

                        // B Channel (Inverted Logic)
                        let valB = 100; 

                        if (isDataCore) {
                            // Inversion: If QR is Dark (Data), make Blue Light (150)
                            valB = qr.isDark(qrR, qrC) ? 150 : 100;
                        }
                        
                        els.ctx.fillStyle = `rgb(${valR}, ${valG}, ${valB})`;
                        els.ctx.fillRect(x, y, modSize + 0.5, modSize + 0.5);
                    }
                }

                // Show Save Button after generation
                document.getElementById('btn-save').classList.remove('hidden');
                
            } catch(e) {
                console.error(e);
            }
        }

        function build7x7Grid(size) {
            const grid = Array(size).fill(0).map(() => Array(size).fill(0));
            const center = Math.floor(size / 2);
            const octantMap = new Map(); 
            const maxBlocks = Math.ceil((size / 2 + 7) / 7); 

            for (let by = 0; by < maxBlocks; by++) {
                for (let bx = by; bx < maxBlocks; bx++) {
                    const patternIdx = Math.floor(Math.random() * SPRITE_LIB_7x7.length);
                    const pattern = SPRITE_LIB_7x7[patternIdx];
                    const flipX = Math.random() > 0.5;
                    const flipY = Math.random() > 0.5;

                    for (let py = 0; py < 7; py++) {
                        for (let px = 0; px < 7; px++) {
                            let sX = flipX ? (6 - px) : px;
                            let sY = flipY ? (6 - py) : py;
                            
                            if ((pattern[sY] >> (6 - sX)) & 1) {
                                let xRel = (bx * 7) + px - 3;
                                let yRel = (by * 7) + py - 3;
                                if (xRel >= yRel && yRel >= 0) {
                                    octantMap.set(`${xRel},${yRel}`, true);
                                }
                            }
                        }
                    }
                }
            }

            octantMap.forEach((val, key) => {
                const [xStr, yStr] = key.split(',');
                const x = parseInt(xStr);
                const y = parseInt(yStr);
                
                const points = [
                    [ x,  y], [ y,  x], [-x,  y], [-y,  x],
                    [ x, -y], [ y, -x], [-x, -y], [-y, -x]
                ];

                points.forEach(([px, py]) => {
                    const absX = center + px;
                    const absY = center + py;
                    if (absX >= 0 && absX < size && absY >= 0 && absY < size) {
                        grid[absY][absX] = 1;
                    }
                });
            });
            return grid;
        }

        function saveQR() { 
            const a = document.createElement('a'); 
            a.download = 'qrnament-mandala.png'; 
            a.href = els.main.toDataURL(); 
            a.click(); 
        }

        // === EVENT LISTENERS ===
        document.getElementById('file-input').addEventListener('change', handleFile);
        els.bText.addEventListener('input', generateMandala);
        
        // Menu Logic
        const menuBtns = [document.getElementById('menu-btn-home'), document.getElementById('menu-btn-create')];
        menuBtns.forEach(btn => {
            if(btn) btn.onclick = (e) => { e.stopPropagation(); els.dropdown.classList.toggle('show'); };
        });
        
        document.onclick = (e) => {
            if(!e.target.closest('#dropdown')) els.dropdown.classList.remove('show');
        };
        
        // === INITIALIZATION ===
        setLang('ua');
        switchScreen('home');

    </script>
