<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>▣ QRGB ULTRA - Pro Engine v4.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', system-ui, sans-serif; overflow-x: hidden; }
        canvas { image-rendering: pixelated; }
        textarea { background: #0a0a0a; border: 1px solid #333; color: #fff; font-family: monospace; }
        
        /* Логотип */
        .logo-q { color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.6); }
        .logo-r { color: #FF004D; text-shadow: 0 0 10px #FF004D; }
        .logo-g { color: #00FF41; text-shadow: 0 0 10px #00FF41; }
        .logo-b { color: #0088FF; text-shadow: 0 0 10px #0088FF; }

        /* Анимация сканирования */
        .scan-line { 
            position:absolute; left:0; right:0; height:3px; 
            background:linear-gradient(90deg,transparent,#00ff41,transparent); 
            box-shadow:0 0 20px #00ff41; 
            top: 0; 
            z-index: 10;
            display: none;
        }
        .scan-active .scan-line {
            display: block;
            animation: scanLine 2.5s linear forwards;
        }
        @keyframes scanLine { 
            0%{top:0%;} 
            100%{top:100%;} 
        }
        
        @keyframes flash { 0%,100%{opacity:0} 50%{opacity:.9} }
        .flash { animation:flash .3s; }
        
        .indicator { width: 12px; height: 12px; border-radius: 50%; background: #222; border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s; }
        .active-r { background: #ff004d; box-shadow: 0 0 10px #ff004d; }
        .active-g { background: #00ff41; box-shadow: 0 0 10px #00ff41; }
        .active-b { background: #0088ff; box-shadow: 0 0 10px #0088ff; }
        
        /* Видео и Картинки */
        #video { object-fit: cover; }
        
        /* Меню */
        .dropdown-menu {
            transform: translateY(-10px);
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
        }
        .dropdown-menu.show {
            transform: translateY(0);
            opacity: 1;
            visibility: visible;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen p-6">

    <!-- Header -->
    <div class="flex items-center justify-between mb-6 relative">
        <canvas id="mini-qr" width="44" height="44" class="rounded bg-zinc-900 border border-white/10"></canvas>
        
        <!-- Логотип QRGB -->
        <h1 class="text-xl font-extrabold tracking-widest uppercase text-center flex-1 flex justify-center gap-0.5">
            <span class="logo-q">Q</span><span class="logo-r">R</span><span class="logo-g">G</span><span class="logo-b">B</span>
        </h1>
        
        <button id="menu-btn" class="w-10 text-white text-xl active:scale-90 transition-transform z-50">☰</button>
        
        <!-- Выпадающее меню -->
        <div id="dropdown" class="dropdown-menu absolute top-full right-0 mt-2 w-56 bg-zinc-900 rounded-xl border border-white/10 shadow-2xl z-50 overflow-hidden">
            <a href="#" class="block px-4 py-3 text-xs text-zinc-300 hover:bg-zinc-800 border-b border-white/5">Як користуватися</a>
            <a href="#" class="block px-4 py-3 text-xs text-zinc-300 hover:bg-zinc-800 border-b border-white/5">Технологія</a>
            <a href="#" class="block px-4 py-3 text-xs text-zinc-300 hover:bg-zinc-800 border-b border-white/5">Автор і контакти</a>
            <button onclick="globalReset()" class="w-full text-left px-4 py-3 text-xs text-red-400 hover:bg-zinc-800 font-bold uppercase tracking-wide">Reset / Очистити всё</button>
        </div>
    </div>

    <!-- Inputs -->
    <div class="space-y-3 mb-6">
        <textarea id="r-text" class="w-full p-4 rounded-xl border-l-4 border-red-600 outline-none h-14 text-sm" placeholder="RED CHANNEL..."></textarea>
        <textarea id="g-text" class="w-full p-4 rounded-xl border-l-4 border-green-600 outline-none h-14 text-sm" placeholder="GREEN CHANNEL..."></textarea>
        <textarea id="b-text" class="w-full p-4 rounded-xl border-l-4 border-blue-600 outline-none h-14 text-sm" placeholder="BLUE (PRIORITY)..."></textarea>
    </div>

    <!-- QR Display -->
    <div class="flex-1 flex items-center justify-center mb-10">
        <div class="relative w-72 h-72 bg-zinc-950 rounded-[2rem] p-5 border border-white/5 shadow-2xl">
            <canvas id="qr-main" width="512" height="512" class="w-full h-full opacity-0 transition-opacity duration-500"></canvas>
        </div>
    </div>

    <!-- Actions -->
    <div class="space-y-3 pb-4">
        <button id="save-btn" onclick="saveQR()" class="w-full py-4 bg-white text-black font-black rounded-2xl hidden active:scale-95 text-xs tracking-widest uppercase">Save Result</button>
        <div class="grid grid-cols-2 gap-3">
            <button onclick="startScannerUI()" class="py-4 bg-zinc-900 text-white font-bold rounded-2xl border border-white/10 active:scale-95 text-[10px] uppercase tracking-widest">Open Camera</button>
            <input type="file" id="file-input" accept="image/*" class="hidden" onchange="handleFile(event)">
            <button onclick="document.getElementById('file-input').click()" class="py-4 bg-zinc-900 text-white font-bold rounded-2xl border border-white/10 active:scale-95 text-[10px] uppercase tracking-widest">Open Gallery</button>
        </div>
    </div>

    <!-- Scanner UI -->
    <div id="scanner-ui" class="fixed inset-0 z-[100] bg-black hidden flex flex-col p-6">
        <div class="flex justify-between items-center mb-6">
            <span class="text-[10px] text-zinc-600 font-bold uppercase tracking-widest">Spectral Analysis</span>
            <button onclick="closeScanner()" class="text-white bg-zinc-800 px-6 py-2 rounded-xl text-[10px] font-black">CLOSE</button>
        </div>
        
        <div id="scan-container" class="relative w-full aspect-square bg-zinc-950 rounded-3xl overflow-hidden border border-white/10 shadow-2xl flex items-center justify-center">
            <video id="video" class="absolute inset-0 w-full h-full object-cover" playsinline></video>
            <canvas id="freeze-frame" class="absolute inset-0 w-full h-full object-cover hidden z-10"></canvas>
            <div class="scan-line"></div>
            <div id="flash-layer" class="absolute inset-0 bg-white opacity-0 pointer-events-none z-50"></div>
        </div>

        <div class="mt-8 space-y-3">
            <!-- Блоки результатов (инициально скрыты или ждут) -->
            <div id="res-r" class="p-4 bg-zinc-900/60 rounded-2xl flex items-center gap-4 border border-white/5 opacity-50">
                <div class="indicator"></div>
                <span class="text-[10px] text-zinc-500 uppercase tracking-tighter">R: Waiting...</span>
            </div>
            <div id="res-g" class="p-4 bg-zinc-900/60 rounded-2xl flex items-center gap-4 border border-white/5 opacity-50">
                <div class="indicator"></div>
                <span class="text-[10px] text-zinc-500 uppercase tracking-tighter">G: Waiting...</span>
            </div>
            <div id="res-b" class="p-4 bg-zinc-900/60 rounded-2xl flex items-center gap-4 border border-blue-500/20 opacity-50">
                <div class="indicator"></div>
                <span class="text-[10px] text-zinc-400 uppercase tracking-tighter">B: Priority Ready</span>
            </div>
            
            <!-- Кнопка Reset при ошибке -->
            <button id="fail-reset-btn" onclick="resetScannerState()" class="w-full py-4 bg-red-900/50 text-red-400 font-bold rounded-2xl border border-red-500/30 text-xs tracking-widest uppercase hidden">
                Reset / Спробувати ще
            </button>
        </div>
    </div>

    <script>
        // --- AUDIO ENGINE ---
        const AudioEngine = {
            ctx: null,
            initialized: false,
            
            init() {
                if(this.initialized) return;
                try {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                    this.initialized = true;
                } catch(e) { console.error("Web Audio API not supported"); }
            },

            playScan() {
                if(!this.ctx) return;
                const now = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();

                osc.type = 'sine';
                // Sweep 200Hz -> 1200Hz
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 2.5);

                // Fade In/Out
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.05, now + 0.5); // Fade in
                gain.gain.setValueAtTime(0.05, now + 2.0); // Hold
                gain.gain.linearRampToValueAtTime(0, now + 2.5); // Fade out

                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start(now);
                osc.stop(now + 2.6);
            },

            playResult(success) {
                if(!this.ctx) return;
                const now = this.ctx.currentTime;
                
                if(success) {
                    // Digital Blip
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(2500, now);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.start(now);
                    osc.stop(now + 0.2);
                } else {
                    // Error Double Pulse
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.setValueAtTime(100, now + 0.15);
                    
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.setValueAtTime(0, now + 0.15);
                    gain.gain.setValueAtTime(0.1, now + 0.2);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
                    
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.start(now);
                    osc.stop(now + 0.4);
                }
            }
        };

        // Init Audio on first interaction
        document.body.addEventListener('click', () => AudioEngine.init(), { once: true });

        // --- ELEMENTS & STATE ---
        const els = {
            r: document.getElementById('r-text'),
            g: document.getElementById('g-text'),
            b: document.getElementById('b-text'),
            main: document.getElementById('qr-main'),
            mini: document.getElementById('mini-qr'),
            video: document.getElementById('video'),
            freeze: document.getElementById('freeze-frame'),
            scanContainer: document.getElementById('scan-container'),
            flash: document.getElementById('flash-layer'),
            failBtn: document.getElementById('fail-reset-btn'),
            resR: document.getElementById('res-r'),
            resG: document.getElementById('res-g'),
            resB: document.getElementById('res-b')
        };

        let scanning = false;
        let results = {r:null, g:null, b:null};
        let scanStartTime = 0;
        let analysisReady = false; // Flag if analysis finished before animation

        // --- MENU LOGIC ---
        document.getElementById('menu-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            document.getElementById('dropdown').classList.toggle('show');
        });
        document.addEventListener('click', (e) => {
            if (!e.target.closest('#dropdown') && !e.target.closest('#menu-btn')) {
                document.getElementById('dropdown').classList.remove('show');
            }
        });

        function globalReset() {
            // Close scanner if open
            closeScanner();
            
            // Clear inputs
            els.r.value = ""; els.g.value = ""; els.b.value = "";
            
            // Clear QR
            els.main.style.opacity = 0;
            document.getElementById('save-btn').classList.add('hidden');
            const mCtx = els.mini.getContext('2d');
            mCtx.fillStyle = "#000"; mCtx.fillRect(0,0,44,44);
            
            document.getElementById('dropdown').classList.remove('show');
        }

        // --- QR Generation with UTF-8 ---
        function generateQR() {
            const texts = [els.r.value, els.g.value, els.b.value];
            if (!texts.some(t => t.trim())) {
                els.main.style.opacity = 0;
                document.getElementById('save-btn').classList.add('hidden');
                return;
            }
            
            let maxVer = 1;
            texts.forEach(t => {
                if(!t.trim()) return;
                const tmp = qrcode(0, 'M'); 
                tmp.addData(unescape(encodeURIComponent(t || " ")));
                tmp.make();
                const v = Math.floor((tmp.getModuleCount() - 17) / 4);
                if (v > maxVer) maxVer = v;
            });
            
            const ctx = els.main.getContext('2d');
            ctx.fillStyle = "#000"; ctx.fillRect(0,0,512,512);
            ctx.globalCompositeOperation = "lighten";
            
            texts.forEach((text, i) => {
                if(!text.trim()) return;
                const qr = qrcode(maxVer, 'M'); 
                qr.addData(unescape(encodeURIComponent(text)));
                qr.make();
                const mod = 512 / qr.getModuleCount();
                ctx.fillStyle = i === 0 ? "#FF0000" : (i === 1 ? "#00FF00" : "#0000FF");
                for (let r = 0; r < qr.getModuleCount(); r++) {
                    for (let c = 0; c < qr.getModuleCount(); c++) {
                        if (qr.isDark(r, c)) ctx.fillRect(c * mod, r * mod, mod, mod);
                    }
                }
            });
            
            ctx.globalCompositeOperation = "source-over";
            els.main.style.opacity = 1;
            document.getElementById('save-btn').classList.remove('hidden');
            els.mini.getContext('2d').drawImage(els.main, 0, 0, 44, 44);
        }
        [els.r, els.g, els.b].forEach(el => el.addEventListener('input', generateQR));

        // --- SCANNER LOGIC ---
        
        function resetScannerState() {
            results = {r:null, g:null, b:null};
            analysisReady = false;
            
            // Reset UI
            els.failBtn.classList.add('hidden');
            els.freeze.classList.add('hidden');
            els.video.classList.remove('hidden');
            els.scanContainer.classList.remove('scan-active');
            
            // Reset Indicators
            ['r', 'g', 'b'].forEach(ch => {
                const el = els['res' + ch.toUpperCase()];
                el.querySelector('span').textContent = ch.toUpperCase() + ': Waiting...';
                el.querySelector('.indicator').className = 'indicator';
                el.classList.remove('hidden'); // Show again if hidden
                el.style.opacity = 0.5;
            });
            
            startCamera(); // Restart camera stream
        }

        function startScannerUI() {
            const ui = document.getElementById('scanner-ui');
            ui.classList.remove('hidden');
            resetScannerState();
        }

        function closeScanner() {
            scanning = false;
            if (els.video.srcObject) els.video.srcObject.getTracks().forEach(t => t.stop());
            document.getElementById('scanner-ui').classList.add('hidden');
        }

        async function startCamera() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                els.video.srcObject = s;
                els.video.play();
                scanning = true;
                scanStartTime = Date.now(); // Track start time
                requestAnimationFrame(scanFrame);
            } catch (e) { alert("Camera Error"); closeScanner(); }
        }

        function scanFrame() {
            if (!scanning) return;
            
            // Draw video frame to check
            if (els.video.readyState === els.video.HAVE_ENOUGH_DATA && !els.freeze.classList.contains('hidden') === false) {
                const cv = document.createElement('canvas');
                cv.width = 480; cv.height = 480;
                const cx = cv.getContext('2d');
                
                // Center Crop Logic
                const vw = els.video.videoWidth;
                const vh = els.video.videoHeight;
                const aspect = vw / vh;
                
                let sx = 0, sy = 0, sw = vw, sh = vh;
                if (aspect > 1) { sw = vh; sx = (vw - sw) / 2; } 
                else { sh = vw; sy = (vh - sh) / 2; }
                
                cx.drawImage(els.video, sx, sy, sw, sh, 0, 0, 480, 480);
                
                // Only process if we haven't found everything yet
                if(!analysisReady) {
                    processImageData(cx.getImageData(0,0,480,480), 480, 480, false);
                }
            }
            requestAnimationFrame(scanFrame);
        }

        // --- Processing ---
        function processImageData(img, w, h, isFileScan) {
            let foundAny = false;
            
            [0, 1, 2].forEach(idx => {
                const ch = ['r', 'g', 'b'][idx];
                if (results[ch]) return;

                const mono = new Uint8ClampedArray(img.data.length);
                
                // Threshold 120
                for (let i = 0; i < img.data.length; i += 4) {
                    const v = img.data[i + idx];
                    const b = v < 120 ? 0 : 255; 
                    mono[i] = mono[i+1] = mono[i+2] = b;
                    mono[i+3] = 255;
                }

                const code = jsQR(mono, w, h, { inversionAttempts: "attemptBoth" });
                
                if (code) {
                    results[ch] = code.data;
                    foundAny = true;
                }
            });

            if(foundAny) {
                // Logic: Stop if Blue or All found
                if (results.b || (results.r && results.g && results.b)) {
                    analysisReady = true;
                    
                    if(isFileScan) {
                        // Wait for animation to finish (handled in handleFile)
                    } else {
                        // Camera: Freeze and start animation
                        triggerCaptureSequence();
                    }
                }
            }
            return foundAny;
        }

        function triggerCaptureSequence() {
            scanning = false; // Stop requesting frames
            
            // 1. Freeze Frame
            els.freeze.width = 480; els.freeze.height = 480;
            const fctx = els.freeze.getContext('2d');
            
            // Re-draw with crop
            const vw = els.video.videoWidth;
            const vh = els.video.videoHeight;
            const aspect = vw / vh;
            let sx = 0, sy = 0, sw = vw, sh = vh;
            if (aspect > 1) { sw = vh; sx = (vw - sw) / 2; } 
            else { sh = vw; sy = (vh - sh) / 2; }
            fctx.drawImage(els.video, sx, sy, sw, sh, 0, 0, 480, 480);
            
            els.video.classList.add('hidden');
            els.freeze.classList.remove('hidden');
            
            // 2. Trigger Animation & Sound
            startVisualizationSequence(true);
        }

        function startVisualizationSequence(success) {
            els.scanContainer.classList.add('scan-active');
            if(success) AudioEngine.playScan();
            
            // Wait 2.5s
            setTimeout(() => {
                // Flash & Result Sound
                els.flash.classList.add('flash');
                AudioEngine.playResult(success);
                setTimeout(() => els.flash.classList.remove('flash'), 300);
                
                // Reveal Data
                if(success) {
                    updateResultUI();
                } else {
                    handleFailUI();
                }
            }, 2500);
        }

        function updateResultUI() {
            let count = 0;
            ['r', 'g', 'b'].forEach(ch => {
                const el = els['res' + ch.toUpperCase()];
                const data = results[ch];
                
                if(data) {
                    count++;
                    el.querySelector('span').textContent = data;
                    el.querySelector('.indicator').className = 'indicator active-'+ch;
                    el.classList.remove('hidden');
                    el.style.opacity = 1;
                    
                    // Update Main Screen
                    els[ch].value = data;
                } else {
                    el.classList.add('hidden'); // Hide empty
                }
            });
            
            generateQR(); // Update main screen QR
            els.failBtn.classList.add('hidden');
        }

        function handleFailUI() {
            ['r', 'g', 'b'].forEach(ch => {
                const el = els['res' + ch.toUpperCase()];
                el.classList.remove('hidden');
                el.style.opacity = 1;
                el.querySelector('span').textContent = "[!] Не вдалося зчитати";
                el.querySelector('.indicator').className = 'indicator';
            });
            els.failBtn.classList.remove('hidden');
        }

        // --- File Handler ---
        function handleFile(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    // Open UI & Reset State
                    const ui = document.getElementById('scanner-ui');
                    ui.classList.remove('hidden');
                    results = {r:null, g:null, b:null};
                    analysisReady = false;
                    
                    // Show Image (Center Crop)
                    els.freeze.width = 480; els.freeze.height = 480;
                    const fctx = els.freeze.getContext('2d');
                    fctx.fillStyle = "#000"; fctx.fillRect(0, 0, 480, 480);
                    
                    // Calculate crop
                    const aspect = img.width / img.height;
                    let sx = 0, sy = 0, sw = img.width, sh = img.height;
                    if (aspect > 1) { sw = img.height; sx = (img.width - sw) / 2; } 
                    else { sh = img.width; sy = (img.height - sh) / 2; }
                    
                    fctx.drawImage(img, sx, sy, sw, sh, 0, 0, 480, 480);
                    
                    els.freeze.classList.remove('hidden');
                    els.video.classList.add('hidden');
                    els.failBtn.classList.add('hidden');
                    
                    // Reset Indicators visual
                    ['r', 'g', 'b'].forEach(ch => {
                        const el = els['res' + ch.toUpperCase()];
                        el.querySelector('span').textContent = ch.toUpperCase() + ': Waiting...';
                        el.querySelector('.indicator').className = 'indicator';
                        el.classList.remove('hidden');
                        el.style.opacity = 0.5;
                    });

                    // Process Logic (High Res internal)
                    const scanSize = 1024;
                    const scv = document.createElement('canvas');
                    scv.width = scanSize; scv.height = scanSize;
                    const sctx = scv.getContext('2d');
                    
                    // Crop for analysis too
                    let ssx=0, ssy=0, ssw=img.width, ssh=img.height;
                    const sAspect = img.width / img.height;
                    if (sAspect > 1) { ssw = img.height; ssx = (img.width - ssw) / 2; }
                    else { ssh = img.width; ssy = (img.height - ssh) / 2; }
                    
                    sctx.drawImage(img, ssx, ssy, ssw, ssh, 0, 0, scanSize, scanSize);
                    
                    processImageData(sctx.getImageData(0,0,scanSize,scanSize), scanSize, scanSize, true);
                    
                    // Trigger Animation
                    startVisualizationSequence(analysisReady);
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }

        function saveQR() {
            const a = document.createElement('a');
            a.download = 'QRGB_PRO.png'; a.href = els.main.toDataURL(); a.click();
        }
    </script>
</body>
</html>
